<div class="page">
  <div class="page-header">
    <div>
      <span class="eyebrow">{{ esEdicion() ? 'Editar' : 'Nuevo' }}</span>
      <h1>{{ esEdicion() ? 'Editar curso' : 'Nuevo curso' }}</h1>
    </div>
    <a class="btn btn-outline" routerLink="/cursos">Volver</a>
  </div>

  <div class="alert alert-error" *ngIf="error()">{{ error() }}</div>

  <form class="card" [formGroup]="form" (ngSubmit)="guardar()">
    <div class="form-grid">
      <div class="field">
        <label for="codigo">Código</label>
        <input id="codigo" type="text" formControlName="codigo" />
        <span class="field-error" *ngIf="form.get('codigo')?.touched && form.get('codigo')?.invalid">
          El código es obligatorio.
        </span>
      </div>

      <div class="field">
        <label for="nombre">Nombre</label>
        <input id="nombre" type="text" formControlName="nombre" />
        <span class="field-error" *ngIf="form.get('nombre')?.touched && form.get('nombre')?.invalid">
          El nombre es obligatorio.
        </span>
      </div>

      <div class="field">
        <label for="ciclo">Ciclo</label>
        <input id="ciclo" type="text" formControlName="ciclo" placeholder="Ej. 2026-I" />
      </div>

      <div class="field">
        <label for="creditos">Créditos</label>
        <input id="creditos" type="number" formControlName="creditos" min="0" />
      </div>

      <div class="field">
        <label for="profesor">Profesor (texto libre)</label>
        <input id="profesor" type="text" formControlName="profesor" />
      </div>

      <div class="field">
        <label for="docenteId">Docente asignado</label>
        <select id="docenteId" formControlName="docenteId">
          <option [ngValue]="null">Sin asignar</option>
          <option *ngFor="let docente of docentes()" [ngValue]="docente.id">
            {{ docente.nombreCompleto || docente.username }}
          </option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" formControlName="descripcion" rows="3"></textarea>
    </div>

    <button class="btn" type="submit" [disabled]="cargando()">
      {{ cargando() ? 'Guardando…' : 'Guardar curso' }}
    </button>
  </form>
</div>
