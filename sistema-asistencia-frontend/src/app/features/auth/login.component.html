<div class="login-screen">
  <div class="login-card card">
    <span class="eyebrow">Sistema de Asistencia</span>
    <h1>Iniciar sesión</h1>
    <p class="sub">Ingresa con tu usuario para registrar u observar la asistencia.</p>

    <div class="alert alert-error" *ngIf="error()">{{ error() }}</div>

    <form [formGroup]="form" (ngSubmit)="enviar()">
      <div class="field">
        <label for="username">Usuario</label>
        <input id="username" type="text" formControlName="username" autocomplete="username" />
        <span class="field-error" *ngIf="form.get('username')?.touched && form.get('username')?.invalid">
          El usuario es obligatorio.
        </span>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" autocomplete="current-password" />
        <span class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          La contraseña es obligatoria.
        </span>
      </div>

      <button class="btn" type="submit" [disabled]="cargando()">
        {{ cargando() ? 'Ingresando…' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
