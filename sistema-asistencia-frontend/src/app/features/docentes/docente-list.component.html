<div class="page">
  <div class="page-header">
    <div>
      <span class="eyebrow">Registro</span>
      <h1>Docentes</h1>
    </div>
    <button class="btn" (click)="mostrarFormulario.set(!mostrarFormulario())">
      {{ mostrarFormulario() ? 'Cancelar' : '+ Nuevo docente' }}
    </button>
  </div>

  <div class="alert alert-error" *ngIf="error()">{{ error() }}</div>

  <form class="card" style="margin-bottom: 20px;" *ngIf="mostrarFormulario()" [formGroup]="form" (ngSubmit)="crear()">
    <div class="form-grid">
      <div class="field">
        <label for="username">Usuario</label>
        <input id="username" type="text" formControlName="username" />
        <span class="field-error" *ngIf="form.get('username')?.touched && form.get('username')?.invalid">
          El usuario es obligatorio.
        </span>
      </div>

      <div class="field">
        <label for="nombreCompleto">Nombre completo</label>
        <input id="nombreCompleto" type="text" formControlName="nombreCompleto" />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" />
        <span class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Mínimo 6 caracteres.
        </span>
      </div>
    </div>

    <button class="btn" type="submit" [disabled]="guardando()">
      {{ guardando() ? 'Creando…' : 'Crear docente' }}
    </button>
  </form>

  <div class="table-wrap" *ngIf="!cargando(); else loading">
    <table class="registro" *ngIf="docentes().length; else vacio">
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Nombre completo</th>
          <th>Rol</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let docente of docentes()">
          <td>{{ docente.username }}</td>
          <td>{{ docente.nombreCompleto || '—' }}</td>
          <td><span class="chip-rol">{{ docente.rol }}</span></td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #vacio>
    <div class="empty-state card">
      <h3>No hay docentes registrados</h3>
      <p>Crea la primera cuenta de docente para asignarla a un curso.</p>
    </div>
  </ng-template>

  <ng-template #loading>
    <p>Cargando docentes…</p>
  </ng-template>
</div>
