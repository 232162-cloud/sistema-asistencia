<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Asistencias - UNAMBA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LtrjvnR4/J57B4U4v+ABn4wMNq9bLw1J3p6ZFDvR9kcBI2YK4prKpF0u7X3M9wQF" crossorigin="anonymous" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">UNAMBA - Asistencia</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Estudiantes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/cursos">Cursos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/asistencias">Asistencias</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row gy-4">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title mb-3">Buscar asistencias</h2>
                    <form class="row g-3" th:action="@{/asistencias/buscar}" method="get">
                        <div class="col-md-4">
                            <label for="fecha" class="form-label">Fecha</label>
                            <input type="date" class="form-control" id="fecha" name="fecha" />
                        </div>
                        <div class="col-md-4">
                            <label for="estado" class="form-label">Estado</label>
                            <select id="estado" name="estado" class="form-select">
                                <option value="">Todos</option>
                                <option value="Presente">Presente</option>
                                <option value="Tarde">Tarde</option>
                                <option value="Falta">Falta</option>
                            </select>
                        </div>
                        <div class="col-md-4 d-flex align-items-end justify-content-end">
                            <button type="submit" class="btn btn-outline-primary me-2">Buscar</button>
                            <a href="/asistencias" class="btn btn-secondary">Limpiar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-xl-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title mb-3">Registrar asistencia</h2>
                    <form th:action="@{/asistencias/guardar}" method="post">
                        <div class="mb-3">
                            <label for="estudianteId" class="form-label">ID Estudiante</label>
                            <input type="text" class="form-control" id="estudianteId" name="estudiante.id" required />
                        </div>
                        <div class="mb-3">
                            <label for="cursoId" class="form-label">ID Curso</label>
                            <input type="text" class="form-control" id="cursoId" name="curso.id" required />
                        </div>
                        <div class="mb-3">
                            <label for="fechaForm" class="form-label">Fecha</label>
                            <input type="date" class="form-control" id="fechaForm" name="fecha" required />
                        </div>
                        <div class="mb-3">
                            <label for="estadoForm" class="form-label">Estado</label>
                            <select id="estadoForm" name="estado" class="form-select" required>
                                <option value="">Seleccione...</option>
                                <option value="Presente">Presente</option>
                                <option value="Tarde">Tarde</option>
                                <option value="Falta">Falta</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="observaciones" class="form-label">Observaciones</label>
                            <textarea class="form-control" id="observaciones" name="observaciones" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar asistencia</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-xl-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title mb-3">Lista de asistencias</h2>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Estudiante</th>
                                    <th>Curso</th>
                                    <th>Fecha</th>
                                    <th>Estado</th>
                                    <th>Observaciones</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="asistencia : ${asistencias}">
                                    <td th:text="${asistencia.id}"></td>
                                    <td th:text="${asistencia.estudiante.nombres}"></td>
                                    <td th:text="${asistencia.curso.nombre}"></td>
                                    <td th:text="${asistencia.fecha}"></td>
                                    <td th:text="${asistencia.estado}"></td>
                                    <td th:text="${asistencia.observaciones}"></td>
                                    <td>
                                        <a th:href="@{/asistencias/editar/{id}(id=${asistencia.id})}" class="btn btn-sm btn-outline-primary me-2">Editar</a>
                                        <a th:href="@{/asistencias/eliminar/{id}(id=${asistencia.id})}" class="btn btn-sm btn-outline-danger">Eliminar</a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(asistencias)}">
                                    <td colspan="7" class="text-center">No hay registros de asistencia.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-KyZXEAg3QhqLMpG8r+Knujsl5+5hb7GX2B0Qx6xZWJ+v5A9d6u0T5+uhZqk9S0G3" crossorigin="anonymous"></script>
</body>
</html>
