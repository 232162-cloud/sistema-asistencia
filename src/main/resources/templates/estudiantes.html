<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Estudiantes - UNAMBA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LtrjvnR4/J57B4U4v+ABn4wMNq9bLw1J3p6ZFDvR9kcBI2YK4prKpF0u7X3M9wQF" crossorigin="anonymous" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">UNAMBA - Asistencia</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/">Estudiantes</a>
                </li>                <li class="nav-item">
                    <a class="nav-link" href="/cursos">Cursos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/asistencias">Asistencias</a>
                </li>            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row gy-4">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title mb-3">Buscar estudiantes</h2>
                    <form class="row g-3" th:action="@{/buscar}" method="get">
                        <div class="col-md-3">
                            <label for="codigo" class="form-label">Código</label>
                            <input type="text" class="form-control" id="codigo" name="codigo" placeholder="Código" />
                        </div>
                        <div class="col-md-3">
                            <label for="nombres" class="form-label">Nombres</label>
                            <input type="text" class="form-control" id="nombres" name="nombres" placeholder="Nombres" />
                        </div>
                        <div class="col-md-3">
                            <label for="apellidos" class="form-label">Apellidos</label>
                            <input type="text" class="form-control" id="apellidos" name="apellidos" placeholder="Apellidos" />
                        </div>
                        <div class="col-md-3">
                            <label for="carrera" class="form-label">Carrera</label>
                            <input type="text" class="form-control" id="carrera" name="carrera" placeholder="Carrera" />
                        </div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn btn-outline-primary">Buscar</button>
                            <a href="/" class="btn btn-secondary">Limpiar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-xl-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title mb-3">Registrar estudiante</h2>
                    <form th:action="@{/guardar}" method="post">
                        <div class="mb-3">
                            <label for="codigoForm" class="form-label">Código</label>
                            <input type="text" class="form-control" id="codigoForm" name="codigo" required />
                        </div>
                        <div class="mb-3">
                            <label for="nombresForm" class="form-label">Nombres</label>
                            <input type="text" class="form-control" id="nombresForm" name="nombres" required />
                        </div>
                        <div class="mb-3">
                            <label for="apellidosForm" class="form-label">Apellidos</label>
                            <input type="text" class="form-control" id="apellidosForm" name="apellidos" required />
                        </div>
                        <div class="mb-3">
                            <label for="carreraForm" class="form-label">Carrera</label>
                            <input type="text" class="form-control" id="carreraForm" name="carrera" required />
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar estudiante</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-xl-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title mb-3">Lista de estudiantes</h2>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Código</th>
                                    <th>Nombres</th>
                                    <th>Apellidos</th>
                                    <th>Carrera</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="estudiante : ${estudiantes}">
                                    <td th:text="${estudiante.id}"></td>
                                    <td th:text="${estudiante.codigo}"></td>
                                    <td th:text="${estudiante.nombres}"></td>
                                    <td th:text="${estudiante.apellidos}"></td>
                                    <td th:text="${estudiante.carrera}"></td>
                                    <td>
                                        <a th:href="@{/editar/{id}(id=${estudiante.id})}" class="btn btn-sm btn-outline-primary me-2">Editar</a>
                                        <a th:href="@{/eliminar/{id}(id=${estudiante.id})}" class="btn btn-sm btn-outline-danger">Eliminar</a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(estudiantes)}">
                                    <td colspan="6" class="text-center">No hay estudiantes registrados.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-KyZXEAg3QhqLMpG8r+Knujsl5+5hb7GX2B0Qx6xZWJ+v5A9d6u0T5+uhZqk9S0G3" crossorigin="anonymous"></script>
</body>
</html>
