<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestión de Cursos - UNAMBA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LtrjvnR4/J57B4U4v+ABn4wMNq9bLw1J3p6ZFDvR9kcBI2YK4prKpF0u7X3M9wQF" crossorigin="anonymous" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">UNAMBA - Asistencia</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Estudiantes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/cursos">Cursos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/asistencias">Asistencias</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row gy-4">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title mb-3">Buscar cursos</h2>
                    <form class="row g-3" th:action="@{/cursos/buscar}" method="get">
                        <div class="col-md-3">
                            <label for="codigo" class="form-label">Código</label>
                            <input type="text" class="form-control" id="codigo" name="codigo" placeholder="Código" />
                        </div>
                        <div class="col-md-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Nombre" />
                        </div>
                        <div class="col-md-3">
                            <label for="profesor" class="form-label">Profesor</label>
                            <input type="text" class="form-control" id="profesor" name="profesor" placeholder="Profesor" />
                        </div>
                        <div class="col-md-3">
                            <label for="ciclo" class="form-label">Ciclo</label>
                            <input type="text" class="form-control" id="ciclo" name="ciclo" placeholder="Ciclo" />
                        </div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn btn-outline-primary">Buscar</button>
                            <a href="/cursos" class="btn btn-secondary">Limpiar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-xl-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title mb-3">Registrar curso</h2>
                    <form th:action="@{/cursos/guardar}" method="post">
                        <div class="mb-3">
                            <label for="codigoForm" class="form-label">Código</label>
                            <input type="text" class="form-control" id="codigoForm" name="codigo" required />
                        </div>
                        <div class="mb-3">
                            <label for="nombreForm" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombreForm" name="nombre" required />
                        </div>
                        <div class="mb-3">
                            <label for="descripcionForm" class="form-label">Descripción</label>
                            <textarea class="form-control" id="descripcionForm" name="descripcion" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="creditosForm" class="form-label">Créditos</label>
                            <input type="number" class="form-control" id="creditosForm" name="creditos" min="0" required />
                        </div>
                        <div class="mb-3">
                            <label for="profesorForm" class="form-label">Profesor</label>
                            <input type="text" class="form-control" id="profesorForm" name="profesor" required />
                        </div>
                        <div class="mb-3">
                            <label for="cicloForm" class="form-label">Ciclo</label>
                            <input type="text" class="form-control" id="cicloForm" name="ciclo" required />
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar curso</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-xl-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title mb-3">Lista de cursos</h2>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Código</th>
                                    <th>Nombre</th>
                                    <th>Descripción</th>
                                    <th>Créditos</th>
                                    <th>Profesor</th>
                                    <th>Ciclo</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="curso : ${cursos}">
                                    <td th:text="${curso.id}"></td>
                                    <td th:text="${curso.codigo}"></td>
                                    <td th:text="${curso.nombre}"></td>
                                    <td th:text="${curso.descripcion}"></td>
                                    <td th:text="${curso.creditos}"></td>
                                    <td th:text="${curso.profesor}"></td>
                                    <td th:text="${curso.ciclo}"></td>
                                    <td>
                                        <a th:href="@{/cursos/editar/{id}(id=${curso.id})}" class="btn btn-sm btn-outline-primary me-2">Editar</a>
                                        <a th:href="@{/cursos/eliminar/{id}(id=${curso.id})}" class="btn btn-sm btn-outline-danger">Eliminar</a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(cursos)}">
                                    <td colspan="8" class="text-center">No hay cursos registrados.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-KyZXEAg3QhqLMpG8r+Knujsl5+5hb7GX2B0Qx6xZWJ+v5A9d6u0T5+uhZqk9S0G3" crossorigin="anonymous"></script>
</body>
</html>
